flutter_launcher_icons:
  # Android
  android: true
  image_path_android: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#052E16"
  adaptive_icon_foreground: "assets/images/logo.png"

  # iOS
  ios: true
  image_path_ios: "assets/images/logo.png"
  remove_alpha_ios: true

  # Web (optional)
  web:
    generate: false
